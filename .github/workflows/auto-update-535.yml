name: Auto update 535 data

on:
  push:
    branches:
      - main

  schedule:
    # Cron cũ: chạy mỗi 15 phút
    - cron: "*/10 * * * *"

    # 13:05 và 21:05 giờ Việt Nam (UTC+7)
    # GitHub Actions dùng giờ UTC:
    # 13:05 VN = 06:05 UTC
    # 21:05 VN = 14:05 UTC
    # - cron: "5 6,14 * * *"

  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Sync new draws into data.json
        run: python crawl_535.py --json "data.json"

      - name: Commit and push if changed
        run: |
          git add data.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "chore: auto update 535 draw data"
          git push
