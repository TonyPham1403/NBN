<!doctype html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Quick Lotto Left UI</title>
    <style>
        /* Copied and scoped ok.py left UI styles. Minor adjustments: hide right column. */
        :root {
            --blocked-default: #ffffff;
            --blocked-note: #00d9f2;
            --blocked-nonexist: #f0c840;
            --submit-answer-color: #ffffff;
            --submit-note-color: #00e2d2;
            --submit-nonexist-color: #e0ca42;
        }

        body,
        table {
            font-family: Arial;
            font-size: 12px;
            margin: 0;
            padding: 0;
            background: #ffffff;
            color: #111;
        }

        /* container is a flex row; right column defines height, children stretch to match */
        .container {
            display: flex;
            justify-content: flex-start;
            align-items: stretch;
            gap: 36px;
            position: relative;
            margin-top: 6px;
            height: 100%;
            overflow-y: hidden;
            box-sizing: border-box;
        }

        table {
            border-collapse: collapse
        }

        html,
        body {
            height: 100vh;
        }

        body {
            overflow: hidden;
        }

        td,
        th {
            border: 1px solid black;
            padding: 6px 10px;
            text-align: center
        }

        .left td:nth-child(2) {
            text-align: left
        }

        .cell {
            display: inline-block;
            box-sizing: border-box;
            width: 20px;
            min-width: 20px;
            line-height: 18px;
            text-align: center;
            cursor: pointer;
            font-variant-numeric: tabular-nums;
            font-size: 12px;
            position: relative;
            --selected-ring-size: 18px;
            --selected-ring-border: 4px;
            transition: background-color .08s linear, color .08s linear;
        }

        /* Placeholder scaffold styling for empty state */
        .cell.placeholder {
            background: #eee;
            color: transparent;
            border-radius: 3px;
            display: inline-block;
            height: 18px;
            line-height: 18px;
        }

        .skeleton-label {
            display: inline-block;
            background: #f3f3f3;
            color: transparent;
            border-radius: 3px;
            padding: 4px 8px;
        }

        /* draw a circular ring using a pseudo-element so layout doesn't change
           Only sequence-number cells (have class `num`) show the ring. Use opacity/transform
           transitions and promote to its own composite layer to avoid repaint flicker. */
        .cell.num {
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            will-change: transform, opacity;
            width: 20px;
            min-width: 20px;
            height: 20px;
            min-height: 20px;
            line-height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            vertical-align: middle;
        }

        .cell.num::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.98);
            width: var(--selected-ring-size);
            height: var(--selected-ring-size);
            border-radius: 50%;
            border: var(--selected-ring-border) solid rgba(255, 0, 0, 0);
            box-shadow: 0 0 0 rgba(255, 0, 0, 0);
            pointer-events: none;
            opacity: 0;
            transition: box-shadow .12s ease, transform .08s ease, opacity .12s ease, border-color .12s ease;
            will-change: transform, opacity;
            backface-visibility: hidden;
        }

        .cell.num.selected::after {
            border-color: rgba(255, 0, 0, 0.95);
            box-shadow: 0 0 6px rgba(255, 0, 0, 0.12);
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .cell.num.auto-circled::after {
            border-color: rgba(255, 0, 0, 0.95);
            box-shadow: 0 0 6px rgba(255, 0, 0, 0.12);
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        /* Submitted numbers highlight (used when Space toggles submit preview).
           The submit state applies a green background; text color is mapped
           by semantic classes so submitted numbers keep their semantic hue.
           Mapping:
             - default (black text) -> white
             - .note-highlight (cyan) -> #00e2d2
             - .nonexist-intersect (yellow) -> #e0ca42
        */
        .cell.submit-highlight {
            background-color: green !important;
            color: var(--submit-answer-color) !important;
            font-weight: bold !important;
            transition: background-color .12s ease, color .12s ease;
        }

        .cell.submit-highlight.note-highlight {
            color: var(--submit-note-color) !important;
        }

        .cell.submit-highlight.nonexist-intersect {
            color: var(--submit-nonexist-color) !important;
        }

        .red {
            color: inherit;
            text-decoration: underline;
            text-decoration-color: red;
            text-decoration-thickness: 2px;
            text-decoration-style: solid
        }

        .idx-highlight {
            color: red !important;
            font-weight: bold !important
        }

        .blocked {
            background: black !important;
            color: var(--blocked-default) !important;
            font-weight: normal !important;
            pointer-events: none;
            cursor: default;
        }

        .cell.num.blocked {
            border-radius: 0;
        }

        #right td span.cell.num.blocked {
            border-radius: 0;
        }

        /* Preserve semantic submit-color mapping for blocked numbers:
           - default blocked text -> white (submit answer color)
           - blocked + note -> cyan (submit note color)
           - blocked + nonexist -> yellow (submit nonexist color)
        */
        .cell.blocked.note-highlight {
            color: var(--submit-note-color) !important;
            font-weight: bold !important;
        }

        .cell.blocked.nonexist-intersect {
            color: var(--submit-nonexist-color) !important;
            font-weight: bold !important;
        }

        .cell.blocked:not(.note-highlight):not(.nonexist-intersect) {
            color: var(--submit-answer-color) !important;
        }

        .bold {
            font-weight: bold;
            color: green
        }

        .chuoi-selected {
            background: green;
            color: white;
            font-weight: bold
        }

        .chuoi-toggled-td {
            background: black !important;
            color: #ffffff !important;
            font-weight: bold
        }

        /* Keep Chuoi label readable on neon submit rows */
        td.answer-neon>span {
            color: #000000 !important;
            font-weight: bold;
            text-shadow: none;
        }

        /* Neon glow for submitted answers (table 2) — stronger and faster animations */
        :root {
            --neon-color: #00ff66;
            --neon-mid: rgba(0, 255, 102, 0.75);
            --neon-outer: rgba(0, 255, 102, 0.6);
            --neon-inner: rgba(0, 255, 102, 1);
            --neon-dark: rgba(0, 0, 0, 0.75)
        }

        .answer-neon {
            position: relative;
            z-index: 0;
            border-radius: 0;
            overflow: visible
        }

        /* label sheen (SVG streak used for Chuỗi label background) */
        .neon-streak {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: visible
        }

        .neon-streak svg {
            width: 100%;
            height: 100%;
            display: block
        }

        .neon-streak .halo {
            stroke: var(--neon-color);
            stroke-width: 12;
            stroke-opacity: 0.28;
            fill: none;
            stroke-linecap: round;
            filter: drop-shadow(0 0 12px var(--neon-dark))
        }

        .neon-streak .trail {
            stroke: var(--neon-color);
            stroke-width: 7;
            fill: none;
            stroke-linecap: round;
            stroke-dasharray: 120 320;
            stroke-dashoffset: 0;
            filter: drop-shadow(0 0 8px var(--neon-dark))
        }

        .neon-streak .core {
            stroke: var(--neon-color);
            stroke-width: 4;
            fill: none;
            stroke-linecap: round;
            stroke-dasharray: 48 368;
            stroke-dashoffset: 0;
            filter: drop-shadow(0 0 10px var(--neon-dark)) drop-shadow(0 0 12px var(--neon-color)) drop-shadow(0 0 26px var(--neon-mid))
        }

        .answer-neon.animate .neon-streak .core,
        .answer-neon.animate .neon-streak .trail {
            animation: neonStroke 2.4s linear infinite
        }

        @keyframes neonStroke {
            from {
                stroke-dashoffset: 0
            }

            to {
                stroke-dashoffset: -416
            }
        }

        /* Per-number neon (strong pulsing glow for individual number cells) */
        .cell.answer-neon {
            border-radius: 6px;
            box-shadow: 0 0 0 3px var(--neon-dark), 0 0 20px var(--neon-color), 0 0 60px var(--neon-mid), 0 0 150px var(--neon-outer), inset 0 0 12px var(--neon-inner);
            transition: box-shadow .12s ease, transform .08s ease;
            will-change: box-shadow
        }

        @keyframes neonPulse {
            0% {
                box-shadow: 0 0 16px var(--neon-color), 0 0 48px var(--neon-mid), 0 0 120px var(--neon-outer)
            }

            50% {
                box-shadow: 0 0 48px var(--neon-color), 0 0 120px var(--neon-mid), 0 0 300px var(--neon-outer)
            }

            100% {
                box-shadow: 0 0 16px var(--neon-color), 0 0 48px var(--neon-mid), 0 0 120px var(--neon-outer)
            }
        }

        .cell.answer-neon.animate {
            animation: neonPulse 0.9s ease-in-out infinite
        }

        /* Keep red ring when an item is both selected and answer-neon (stronger) */
        .selected.answer-neon {
            border-radius: 50%;
            box-shadow: 0 0 0 4px red, 0 0 0 6px var(--neon-dark), 0 0 20px var(--neon-color), 0 0 60px var(--neon-mid), 0 0 150px var(--neon-outer), inset 0 0 12px var(--neon-inner);
            transition: box-shadow .12s ease, transform .08s ease
        }

        @keyframes neonPulseSelected {
            0% {
                box-shadow: 0 0 0 4px red, 0 0 16px var(--neon-color), 0 0 48px var(--neon-mid), 0 0 120px var(--neon-outer)
            }

            50% {
                box-shadow: 0 0 0 4px red, 0 0 48px var(--neon-color), 0 0 120px var(--neon-mid), 0 0 300px var(--neon-outer)
            }

            100% {
                box-shadow: 0 0 0 4px red, 0 0 16px var(--neon-color), 0 0 48px var(--neon-mid), 0 0 120px var(--neon-outer)
            }
        }

        .selected.answer-neon.animate {
            animation: neonPulseSelected 0.9s ease-in-out infinite
        }

        /* Hide right area inside iframe */
        #right {
            display: block
        }

        /* Adjust left container sizing to fit iframe area */
        .left-container {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-self: stretch;
            /* fill height set by right column */
            height: auto;
            flex: 0 0 auto;
            width: auto;
            box-sizing: border-box;
            padding-right: 8px;
            min-height: 0;
            overflow-y: hidden;
            /* prevent meaningless vertical scrollbar in left half */
            --left-table-scale: 0.81;
            transform-origin: left center;
            transform: scale(var(--left-table-scale));
        }

        .tableWrapper {
            display: flex;
            flex: 1 1 auto;
            flex-direction: column;
            justify-content: center;
            /* center table vertically within left column */
            align-items: flex-start;
            /* anchor table to left edge so it grows rightwards */
            overflow-x: visible;
            overflow-y: hidden;
            max-width: none;
            width: auto;
            box-sizing: border-box;
        }

        /* ensure the left output area itself doesn't show a vertical scrollbar */
        #left {
            overflow-y: hidden;
        }

        /* Hide scrollbar visuals for left area across browsers */
        .left-container,
        .tableWrapper,
        #left {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .left-container::-webkit-scrollbar,
        .tableWrapper::-webkit-scrollbar,
        #left::-webkit-scrollbar {
            width: 0;
            height: 0;
            background: transparent;
        }

        /* Left compact sizing (match ok.py) */
        #left table {
            font-size: 13px;
        }

        /* tableWrapper layout only; scale moved to .left-container */

        #left td,
        #left th {
            padding: 3px 6px;
            vertical-align: top;
            white-space: nowrap;
        }

        #left td .cell {
            width: 20px;
            min-width: 20px;
            height: 20px;
            min-height: 20px;
            line-height: 20px;
            font-size: 13px;
            margin-right: 0;
            padding: 0;
        }

        /* midwrap centers the inline-flex .container inside iframe */
        .midwrap {
            display: flex;
            justify-content: center;
            width: 100%;
            box-sizing: border-box;
        }

        /* anchor left table to left edge so it expands rightwards */
        #left table {
            margin-left: 0;
            margin-right: auto;
            display: table;
        }

        /* small copy button positioned to the right; visually place it outside without widening the table */
        #right tr>td:nth-child(2) {
            position: relative;
            overflow: visible;
        }

        /* Right column height control to avoid page scrolling in iframe */
        /* slightly reduce full-viewport height so external left-side scrollbar doesn't appear */
        .midwrap {
            height: calc(100vh - 10px);
            overflow: hidden;
        }

        /* CSS vars let JS tune row padding, font-size and line-height to fit vertically */
        #right {
            --right-row-padding: 8px;
            --right-font-size: 11px;
            --right-line-height: 16px;
            /* visual scale for the 5 number cells (does not affect layout) */
            --right-cell-scale: 1.35;
            /* increase vertical space for table 2 (slightly reduced to avoid outer scrollbar) */
            max-height: calc(100vh - 14px);
            overflow-y: auto;
            overflow-x: hidden;
            /* avoid horizontal scrollbar */
            box-sizing: border-box;
            padding-left: 8px;
            flex: 1 1 0;
            min-width: 0;
            margin-left: 0;
        }

        #right td,
        #right th {
            padding: var(--right-row-padding) 6px;
            vertical-align: middle;
        }

        /* Separate spacing for the alternating rows in table 2.
           Chuỗi rows get a little more room; index/pattern rows are compact. */
        #right tr.chuoi-main-row>td {
            padding-top: calc(var(--right-row-padding) + 1px);
            padding-bottom: calc(var(--right-row-padding) + 1px);
        }

        #right tr.chuoi-pattern-row>td {
            padding-top: calc(var(--right-row-padding) - 5px);
            padding-bottom: calc(var(--right-row-padding) - 5px);
            font-size: calc(var(--right-font-size) * 0.82);
            line-height: calc(var(--right-line-height) * var(--right-cell-scale) * 0.82);
            overflow: hidden;
        }

        /* Spacer row between Chuỗi blocks, matching ok.py's blank separator row. */
        #right tr.chuoi-gap-row>td {
            border: none;
            padding: 0;
            height: 5px;
            line-height: 5px;
            background: #ffffff !important;
            position: relative;
            z-index: 2;
            pointer-events: none;
        }

        /* Make Chuỗi rows feel taller by enlarging the visible label and numbers slightly.
           Use font-size/line-height instead of transform so the content does not spill into
           the next row and get covered by the black pattern row. */
        #right tr.chuoi-main-row td:first-child span,
        #right tr.chuoi-main-row td:nth-child(2) .cell.num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        #right tr.chuoi-main-row td:first-child span {
            font-size: calc(var(--right-font-size) * 1.1);
            line-height: 1.15;
            transform-origin: left center;
        }

        #right tr.chuoi-main-row td:nth-child(2) .cell.num {
            font-size: calc(var(--right-font-size) * var(--right-cell-scale) * 1.14);
            line-height: calc(var(--right-line-height) * var(--right-cell-scale) * 1.1);
        }

        /* For right-side numbers, use font-size/line-height scaling instead of transform so the
           selection pseudo-element stays centered on the glyph. Also adjust ring size to match. */
        #right td span.cell {
            width: auto;
            min-width: 18px;
            line-height: calc(var(--right-line-height) * var(--right-cell-scale));
            font-size: calc(var(--right-font-size) * var(--right-cell-scale));
            display: inline-block;
            margin-right: 0;
            /* scale the selection ring proportionally for right table */
            --selected-ring-size: calc(15px * var(--right-cell-scale));
            --selected-ring-border: calc(3px * var(--right-cell-scale));
        }

        #right td span.cell.num {
            width: calc(var(--right-line-height) * var(--right-cell-scale));
            min-width: calc(var(--right-line-height) * var(--right-cell-scale));
            height: calc(var(--right-line-height) * var(--right-cell-scale));
            min-height: calc(var(--right-line-height) * var(--right-cell-scale));
            line-height: calc(var(--right-line-height) * var(--right-cell-scale));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            vertical-align: middle;
        }

        /* Slightly smaller text for index/frequency cells in right table */
        #right .cell.index {
            font-size: calc(var(--right-font-size) * 0.85);
            line-height: calc(var(--right-line-height) * var(--right-cell-scale) * 0.85);
            width: calc(var(--right-line-height) * var(--right-cell-scale));
            min-width: calc(var(--right-line-height) * var(--right-cell-scale));
            height: calc(var(--right-line-height) * var(--right-cell-scale));
            min-height: calc(var(--right-line-height) * var(--right-cell-scale));
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            vertical-align: middle;
            margin-right: 0;
        }

        /* Make the 5-number submit blocks in the right table appear square like table 1 */
        /* Use the right-row line-height * scale so width matches computed height and stays square */
        #right td span.cell.submit-highlight {
            box-sizing: border-box;
            /* remove any extra padding so internal content doesn't enlarge the box */
            padding: 0;
            text-align: center;
            border-radius: 4px !important;
        }

        /* Preserve semantic text colors when submit-highlight is active */
        #right td span.cell.submit-highlight.note-highlight {
            color: var(--submit-note-color) !important;
            font-weight: bold !important;
        }

        #right td span.cell.submit-highlight.nonexist-intersect {
            color: var(--submit-nonexist-color) !important;
            font-weight: bold !important;
        }

        #right td span.cell.submit-highlight.idx-highlight {
            color: red !important;
            font-weight: bold !important;
        }

        /* hide inline copy buttons in the table; we'll render floating buttons instead */
        .copyBtn {
            display: none;
        }

        /* floating container covering the full viewport (buttons positioned via JS) */
        .floatingCopyContainer {
            position: fixed;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            pointer-events: none;
            /* allow clicks only on the buttons */
            z-index: 9999;
        }

        .copyBtnFloating {
            position: absolute;
            pointer-events: auto;
            width: 24px;
            height: 24px;
            font-size: 11px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background: #f7f7f7;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
            cursor: pointer;
        }

        /* highlights for note / nonexist */
        .note-highlight {
            color: #0097a7;
            font-weight: bold
        }

        .nonexist-intersect {
            color: #e6b800;
            font-weight: bold
        }

        #resetBtn,
        #submitBtn {
            font-size: 12px;
            padding: 4px 8px;
            font-weight: bold;
            cursor: pointer;
            margin: 0;
            background: none;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        #mode {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 4px 8px;
            height: 24px;
            line-height: 1;
            background-color: #ffffff;
            color: #111111;
            font-weight: bold;
        }

        select#mode.synced-mode,
        #mode.synced-mode {
            background-color: #006400 !important;
            color: #ffffff !important;
            font-weight: bold;
            border-color: #006400 !important;
        }

        select#mode:disabled,
        select#mode.synced-mode:disabled,
        #mode:disabled,
        #mode.synced-mode:disabled {
            opacity: 1 !important;
            filter: none !important;
            background-color: #006400 !important;
            color: #ffffff !important;
            -webkit-text-fill-color: #ffffff !important;
        }

        /* Submit button active state: dark green background when submit preview is ON */
        #submitBtn.active {
            background: #2e7d32;
            color: #ffffff;
            border-color: #1b5e20;
        }

        /* Actions row directly above the left table (hidden until we align after scaling) */
        .tableActions {
            display: none;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            width: 100%;
            box-sizing: border-box;
            padding: 4px 0 6px 0;
            align-self: stretch;
            /* make it span full width inside .tableWrapper */
        }

        .tableActions .actions-right {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        #searchBox {
            width: calc(6ch + 16px);
            box-sizing: border-box;
            text-align: center;
            font-size: 12px;
            padding: 6px 8px;
            margin-left: 6px;
            border: none;
            border-radius: 6px;
            background: #ffffff;
            box-shadow: inset 0 0 0 1px #ccc;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            position: relative;
            z-index: 2;
            transform: translateZ(0);
        }

        #searchBox:focus {
            outline: none;
            box-shadow: inset 0 0 0 1px #1e88e5, 0 0 4px rgba(30, 136, 229, 0.15);
        }

        .pair-btn {
            background: none;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 3px 6px;
            margin: 2px;
            cursor: pointer;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            height: 24px
        }

        .pair-btn.pair-selected {
            background: #2e7d32;
            color: #ffffff;
            border-color: #1b5e20
        }
    </style>
</head>

<body>
    <div class="midwrap">
        <div class="container">
            <div class="left-container">
                <div class="controls">
                    <textarea id="input" rows="1"
                        placeholder="Paste tối đa 11 chuỗi, cách nhau bằng khoảng trắng"></textarea>
                    <br>
                    <div class="mode-row">
                        <select id="mode">
                            <option value="modeq">?</option>
                            <option value="pair1">1 bộ 2</option>
                            <option value="pair2">2 bộ 2</option>
                            <option value="pair3">3 bộ 2</option>
                            <option value="pair4">4 bộ 2</option>
                            <option value="pair5">5 bộ 2</option>
                            <option value="triple1">1 bộ 3</option>
                        </select>
                        <button id="pickBtn">Pick</button>
                        <span id="pickPreview" style="font-weight:normal;color:#333"></span>
                    </div>
                    <div id="pairList"
                        style="margin-top:6px;font-size:13px;color:#333;white-space:normal;word-break:break-word;overflow-wrap:anywhere;display:flex;align-items:center;flex-wrap:wrap;gap:6px;max-width:100%;box-sizing:border-box">
                    </div>

    <script>

                if (phaseHistory.length > 5) phaseHistory.shift();
            } catch (e) { }

        function getSubmitAutoCircleSet() {

                        raw.lines.slice(0, 10).forEach(line => {
                            if (p) return;
                            let nums = getNumsFromLineObj(line);
                            let selInLine = nums.filter(x => simulatedSelected.has(x));

                        raw.lines.slice(0, 10).forEach(line => {
                            let nums = getNumsFromLineObj(line);
                            if (nums.some(n => p.includes(n))) nums.forEach(n => { if (!p.includes(n)) simBlocked.add(n); });

                    }
                    let extraSelected = nums.filter(n => (selSet.has(n) || simulatedSelected.has(n)) && !pairs.some(p => p && p.includes(n)));
                    if (extraSelected.length > 0 && pairsInLine.length >= 1) nums.forEach(n => b.add(n));

            let simBlocked = new Set();
            if (raw) {

                    let p = null;
                    if (mode === "pair1") {

        function toggleNumber(n) {

                clearedFocusBackup = null;

                try { phaseHistory = phaseHistory.filter(function (e) { return e && e.number !== n; }); } catch (ee) { }

            try { recomputePairsFromSelected(); } catch (e) { }
            try { updateBlocked(); } catch (e) { }
            try { refreshPairTailSelectionState(); } catch (e) { }

        }

        function onNumberCellClick(n, region, rowIdx) {

        // Apply selection / idx-highlight / blocked classes in-place to avoid rerender flicker
        function applySelectionAndBlockedInDOM(changedNum) {

        function process() {
            let rawText = document.getElementById("input").value.trim();
            debugLog('process() called — input length:', rawText.length);
            let rows = [];
            if (!rawText) { updateRender(); return; }
            if (rawText.indexOf('\n') !== -1 || rawText.indexOf('\r') !== -1) {

                linesRaw.forEach(line => {
                    if (line.indexOf('\t') !== -1) {

                        rows.push({ result: parts[0] || '', note: parts[1] || '', nonexist: parts[2] || '' });
                    } else {
                        const trimmed = line.trim();
                        const pipeIdx = trimmed.indexOf('|');
                        if (pipeIdx !== -1) {
                            rows.push({
                                result: trimmed.slice(0, pipeIdx).trim(),

        function computeTails() {
            // Lightweight tails computation: return empty array when insufficient data
            if (!raw || !raw.lines || raw.lines.length < 10) return [];
            // Use a simplified adjacent-occurrence heuristic
            const display = raw.lines.slice(0, 10);

            for (let i = 0; i < sets.length - 1; i++) {
                const top = sets[i], bottom = sets[i + 1];
                top.forEach(a => { bottom.forEach(b => { if (a === b) return; const key = a + ',' + b; if (!adjMap[key]) adjMap[key] = []; adjMap[key].push(i); }); });
            }
            const tails = [];
            for (const key in adjMap) { const idxs = adjMap[key].slice().sort((a, b) => a - b); const parts = key.split(',').map(x => parseInt(x, 10)); const a = parts[0], b = parts[1]; let last = -3, count = 0; for (const ii of idxs) { if (ii > last + 1) { count++; last = ii; } } if (count >= 2) tails.push({ a: a, b: b, idxs: idxs, main: Math.min(...idxs), count: count }); }
            return tails.sort((x, y) => { const ix = x.idxs.length ? Math.min(...x.idxs) : Infinity; const iy = y.idxs.length ? Math.min(...y.idxs) : Infinity; if (ix !== iy) return ix - iy; if (x.a !== y.a) return x.a - y.a; return x.b - y.b; });

        // Compute pairs according to user's rules (copied from ok.py)
        function computePairs() {
            if (!raw || !raw.lines || raw.lines.length < 10) return [];
            const display = raw.lines.slice(0, 10);
            const sets = display.map(l => new Set(getNumsFromLineObj(l)));
            const allNums = new Set();
            sets.forEach(s => s.forEach(n => allNums.add(n)));
            const nums = Array.from(allNums).sort((a, b) => a - b);
            const out = [];
            const adjPairs = [];
            for (let topIdx = 0; topIdx < sets.length - 1; topIdx++) adjPairs.push({ top: topIdx, bottom: topIdx + 1 });

            for (let i = 0; i < nums.length; i++) {
                for (let j = i + 1; j < nums.length; j++) {
                    const a = nums[i], b = nums[j];
                    const mains = [];
                    for (let idx = 0; idx < sets.length; idx++) { if (sets[idx].has(a) && sets[idx].has(b)) mains.push(idx); }
                    if (mains.length === 0) continue;
                    let allMainsOk = true;
                    for (const mainIdx of mains) {
                        let aboveFound = false;
                        for (const p of adjPairs) {
                            if (p.bottom < mainIdx) {
                                if ((sets[p.top].has(a) && sets[p.bottom].has(b)) || (sets[p.top].has(b) && sets[p.bottom].has(a))) {
                                    if (!((sets[p.top].has(a) && sets[p.top].has(b)) || (sets[p.bottom].has(a) && sets[p.bottom].has(b)))) {

                                            ((raw.freq[a] === 3 && raw.freq[b] === 2) || (raw.freq[a] === 2 && raw.freq[b] === 3))
                                        ));
                                        if (!allowAboveIfFreq2) { aboveFound = true; break; }
                                    }
                                }
                            }
                        }
                        if (aboveFound) { allMainsOk = false; break; }

                        let foundForThisMain = false;
                        for (const p of adjPairs) {
                            if (!(p.top > mainIdx && p.bottom > mainIdx)) continue;
                            if ((sets[p.top].has(a) && sets[p.bottom].has(b)) || (sets[p.top].has(b) && sets[p.bottom].has(a))) {
                                if ((sets[p.top].has(a) && sets[p.top].has(b)) || (sets[p.bottom].has(a) && sets[p.bottom].has(b))) continue;
                                foundForThisMain = true; break;
                            }
                        }
                        if (!foundForThisMain) {
                            const allowAboveIfFreq2 = (raw && raw.freq && (
                                (raw.freq[a] >= 2 && raw.freq[b] >= 2 && mainIdx === sets.length - 1) ||
                                ((raw.freq[a] === 3 && raw.freq[b] === 2) || (raw.freq[a] === 2 && raw.freq[b] === 3))
                            ));
                            if (allowAboveIfFreq2) {
                                for (const p of adjPairs) {
                                    if (!(p.bottom < mainIdx)) continue;
                                    if ((sets[p.top].has(a) && sets[p.bottom].has(b)) || (sets[p.top].has(b) && sets[p.bottom].has(a))) {
                                        if ((sets[p.top].has(a) && sets[p.top].has(b)) || (sets[p.bottom].has(a) && sets[p.bottom].has(b))) continue;
                                        foundForThisMain = true; break;
                                    }
                                }
                            }
                        }
                        if (!foundForThisMain) { allMainsOk = false; break; }
                    }
                    if (allMainsOk) out.push([a, b]);
                }
            }
            const seen = new Set(); const uniq = [];
            out.forEach(p => { const k = p[0] + ',' + p[1]; if (!seen.has(k)) { seen.add(k); uniq.push(p); } });
            return uniq;
        }

        // Helper: compute highlight refs coming from 11th line (same logic as in renderTable2)

        // Helper: compute base reference exponents from the 10 displayed rows (same as renderTable2)
        function computeHighlightRefs(displayLines) {
            const idToIndex = {};
            let baseFound = false, baseId = null, baseIndex = null;
            displayLines.forEach(function (lineObj, idx) {
                const noteText = (lineObj && lineObj.note) ? String(lineObj.note) : '';
                const idMatch = noteText.match(/([0-9]+)\s*-/);
                if (idMatch) {
                    const idNum = parseInt(idMatch[1], 10);
                    if (!isNaN(idNum)) {
                        idToIndex[idNum] = idx;
                        if (!baseFound) { baseFound = true; baseId = idNum; baseIndex = idx; }
                    }
                }
            });

            let inferredStep = null;
            if (baseFound) {
                for (const k in idToIndex) {
                    const idNum = parseInt(k, 10);
                    const idx = idToIndex[k];
                    if (idNum === baseId) continue;
                    const deltaId = idNum - baseId;
                    const deltaIdx = idx - baseIndex;
                    if (deltaIdx !== 0) {
                        const step = Math.round(deltaId / deltaIdx);
                        if (step !== 0) { inferredStep = step; break; }
                    }
                }
            }
            if (inferredStep === null) inferredStep = -1;

            const highlightRefs = new Array(displayLines.length).fill(0);
            const supMap = { '¹': '1', '²': '2', '³': '3', '⁴': '4', '⁵': '5', '⁶': '6', '⁷': '7', '⁸': '8', '⁹': '9', '⁰': '0' };
            displayLines.forEach(function (lineObj) {
                if (!lineObj || !lineObj.note) return;
                const noteText = String(lineObj.note || '');
                const reRef = /([0-9]+)-([0-9]+)([¹²³⁴⁵⁶⁷⁸⁹⁰]*)/g;
                let m;
                while ((m = reRef.exec(noteText)) !== null) {
                    const refId = parseInt(m[2], 10);
                    const supStr = m[3] || '';
                    let exp = 1;
                    if (supStr.length) {
                        let digits = '';
                        for (const ch of supStr) digits += (supMap[ch] || '');
                        if (digits.length) {
                            const v = parseInt(digits, 10);
                            if (!isNaN(v)) exp = v;
                        }
                    }
                    let j = null;
                    if (Object.prototype.hasOwnProperty.call(idToIndex, refId)) {
                        j = idToIndex[refId];
                        highlightRefs[j] = Math.max(highlightRefs[j], exp);
                    } else if (baseFound) {
                        j = baseIndex + Math.round((refId - baseId) / inferredStep);
                        if (j >= 0 && j < displayLines.length) highlightRefs[j] = Math.max(highlightRefs[j], exp);

        // Restart neon animation classes so newly loaded data shows animated glow immediately.

        // Apply submitActive and answerNums to DOM in-place to avoid full reflow
        function applySubmitState() {
            try {
                debugLog('applySubmitState() start', { answerNums: answerNums, simulatedSelectedSize: (simulatedSelected && simulatedSelected.size) ? simulatedSelected.size : 0 });
                if (!raw) return;
                var displayLines = raw.lines.slice(0, 10);
                var answerSet = new Set((answerNums || []).map(Number));
                var autoCircleSet = getSubmitAutoCircleSet();
                var right = document.getElementById('right');
                var left = document.getElementById('left');
                if (!right || !left) return;
                var table = right.querySelector('table');
                if (!table) return;

                // compute 11th-line refs used for neon
                var highlightRefs = computeHighlightRefs(displayLines);
                var highlightRefs11 = computeHighlightRefs11(displayLines);

                var mainRows = table.querySelectorAll('tr.chuoi-main-row');
                var patternRows = table.querySelectorAll('tr.chuoi-pattern-row');
                for (var i = 0; i < displayLines.length; i++) {

                    var labelTd = mainRow.children[0];
                    var numsTd = mainRow.children[1];
                    var nums = getNumsFromLineObj(displayLines[i]);
                    var rowAnswerCount = 0;
                    nums.forEach(function (n) { if (answerSet.has(n)) rowAnswerCount++; });
                    // Keep neon driven by the live submit count in this row only.
                    var isNeon = submitActive && rowAnswerCount >= 2;

                    debugLog('applySubmitState row', { row: i, rowAnswerCount: rowAnswerCount, isNeon: isNeon });

                    // handle neon element in labelTd

                        var existingNeon = labelTd.querySelector('.neon-streak');

                            }
                        } else if (!isNeon && existingNeon) {
                            existingNeon.remove();
                            labelTd.style.removeProperty('--neon-color');
                            labelTd.style.removeProperty('--neon-mid');
                            labelTd.style.removeProperty('--neon-inner');
                            labelTd.style.removeProperty('--neon-outer');

                        else { labelTd.classList.remove('answer-neon'); labelTd.classList.remove('animate'); }
                    }

                            effectiveRefExp = Math.min(4, Math.max(effectiveRefExp, 0) + 1);

        function updateFocusIndicator() {
            const ind = document.getElementById('focusIndicator');
            if (!ind || !raw) { if (ind) ind.style.opacity = 0; return; }
            // If there are no selected numbers at all, hide the arrow unconditionally.
            if ((selected.size === 0) && (simulatedSelected.size === 0) && (transientSelected.size === 0)) {
                ind.style.opacity = 0;
                return;
            }
            if (submitActive && preSubmitSelected && preSubmitSelected.size === 0) { ind.style.opacity = 0; return; }

            let region = lastClickedRegion || 'left';
            let top = 0, left = 0;
            try {
                const indH = ind.offsetHeight || 18;
                const indW = ind.offsetWidth || 18;
                if (region === 'right') {
                    let maxRow = Math.min(raw.lines.length, 10) - 1;
                    let rowIdx = (currentPhaseRow != null) ? currentPhaseRow : (lastClickedRow != null ? lastClickedRow : 0);
                    if (rowIdx < 0) rowIdx = 0;
                    if (rowIdx > maxRow) rowIdx = maxRow;
                    const tableRows = document.querySelectorAll('#right table tr');
                    let domIdx = rowIdx * 3;
                    let tr = tableRows[domIdx];
                    if (!tr) { ind.style.opacity = 0; return; }
                    const r = tr.getBoundingClientRect();
                    top = window.scrollY + r.top + (r.height - indH) / 2;
                    left = r.left - (indW + 10);
                } else {
                    let groups = {};
                    for (let i = 1; i <= 35; i++) { let f = raw.freq[i]; if (!groups[f]) groups[f] = []; groups[f].push(i); }
                    let freqs = Object.keys(groups).map(x => +x).sort((a, b) => b - a);
                    let prevRowIdx = 0;
                    if (currentPhaseNumber != null) {
                        let f = raw.freq[currentPhaseNumber]; prevRowIdx = freqs.indexOf(f); if (prevRowIdx === -1) prevRowIdx = 0;
                    } else if (lastClickedRow != null) {
                        let nums = getNumsFromLineObj(raw.lines[lastClickedRow]);
                        if (nums.length) { let f = raw.freq[nums[0]]; prevRowIdx = freqs.indexOf(f); if (prevRowIdx === -1) prevRowIdx = 0; }
                    } else if (lastClickedNumber != null) {
                        let f = raw.freq[lastClickedNumber]; prevRowIdx = freqs.indexOf(f); if (prevRowIdx === -1) prevRowIdx = 0;
                    } else {
                        for (let i = pickOrder.length - 1; i >= 0; i--) {

                    let domIdx = Math.min(tableRows.length - 1, prevRowIdx + 1);

                ind.style.top = top + 'px';
